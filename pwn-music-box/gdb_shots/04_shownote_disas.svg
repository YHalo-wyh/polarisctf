<svg xmlns="http://www.w3.org/2000/svg" width="900" height="566"><rect width="100%" height="100%" fill="#0d1117"/><text x="20" y="32" font-family="DejaVu Sans Mono, monospace" font-size="18" fill="#7ee787">04 shownote disas</text><text x="20" y="60" font-family="DejaVu Sans Mono, monospace" font-size="16" fill="#c9d1d9"><tspan x="20" y="60">Dump of assembler code for function ShowNote:</tspan><tspan x="20" y="82">0x0000000000001d2c &lt;+41&gt;:  lea    rax,[rip+0x254d]        # 0x4280 &lt;g_mutex&gt;</tspan><tspan x="20" y="104">0x0000000000001d36 &lt;+51&gt;:  call   0x12a0 &lt;pthread_mutex_lock@plt&gt;</tspan><tspan x="20" y="126">0x0000000000001d3b &lt;+56&gt;:  mov    rdx,QWORD PTR [rip+0x25ce]        # 0x4310 &lt;gc+16&gt;</tspan><tspan x="20" y="148">0x0000000000001d42 &lt;+63&gt;:  mov    eax,DWORD PTR [rbp-0x14]</tspan><tspan x="20" y="170">0x0000000000001d47 &lt;+68&gt;:  add    rax,rdx</tspan><tspan x="20" y="192">0x0000000000001d4a &lt;+71&gt;:  mov    QWORD PTR [rbp-0x8],rax</tspan><tspan x="20" y="214">...</tspan><tspan x="20" y="236">0x0000000000001d69 &lt;+102&gt;: cmp    edx,eax</tspan><tspan x="20" y="258">0x0000000000001d6b &lt;+104&gt;: jne    0x1d86 &lt;ShowNote+131&gt;</tspan><tspan x="20" y="280">...</tspan><tspan x="20" y="302">0x0000000000001d86 &lt;+131&gt;: mov    WORD PTR [rbp-0x10],0x0</tspan><tspan x="20" y="324">0x0000000000001d8c &lt;+137&gt;: mov    WORD PTR [rbp-0xe],0x8</tspan><tspan x="20" y="346">...</tspan><tspan x="20" y="368">0x0000000000001da9 &lt;+166&gt;: add    edx,0x8</tspan><tspan x="20" y="390">0x0000000000001db3 &lt;+176&gt;: add    rcx,rdx</tspan><tspan x="20" y="412">0x0000000000001dc1 &lt;+190&gt;: call   0x11a0 &lt;write@plt&gt;</tspan><tspan x="20" y="434"></tspan><tspan x="20" y="456">What to look at:</tspan><tspan x="20" y="478">- lock happens inside ShowNote, after offset was already passed in</tspan><tspan x="20" y="500">- ptr = gc.base + off is built at +56..+71</tspan><tspan x="20" y="522">- if header check fails, fallback becomes off=0, len=8</tspan><tspan x="20" y="544">- then it reads fixed 8 bytes from ptr+8</tspan></text></svg>