<svg xmlns="http://www.w3.org/2000/svg" width="900" height="412"><rect width="100%" height="100%" fill="#0d1117"/><text x="20" y="32" font-family="DejaVu Sans Mono, monospace" font-size="18" fill="#7ee787">03 getslotoffset disas</text><text x="20" y="60" font-family="DejaVu Sans Mono, monospace" font-size="16" fill="#c9d1d9"><tspan x="20" y="60">Dump of assembler code for function GetSlotOffset:</tspan><tspan x="20" y="82">0x0000000000001a72 &lt;+0&gt;:   endbr64</tspan><tspan x="20" y="104">0x0000000000001a7a &lt;+8&gt;:   mov    DWORD PTR [rbp-0x4],edi</tspan><tspan x="20" y="126">0x0000000000001a7d &lt;+11&gt;:  mov    eax,DWORD PTR [rip+0x2881]        # 0x4304 &lt;gc+4&gt;</tspan><tspan x="20" y="148">0x0000000000001a83 &lt;+17&gt;:  cmp    DWORD PTR [rbp-0x4],eax</tspan><tspan x="20" y="170">0x0000000000001a8f &lt;+29&gt;:  mov    eax,DWORD PTR [rbp-0x4]</tspan><tspan x="20" y="192">0x0000000000001a92 &lt;+32&gt;:  add    rax,0x102</tspan><tspan x="20" y="214">0x0000000000001a98 &lt;+38&gt;:  lea    rdx,[rax*8+0x0]</tspan><tspan x="20" y="236">0x0000000000001aa0 &lt;+46&gt;:  lea    rax,[rip+0x2861]        # 0x4308 &lt;gc+8&gt;</tspan><tspan x="20" y="258">0x0000000000001aa7 &lt;+53&gt;:  mov    eax,DWORD PTR [rdx+rax*1]</tspan><tspan x="20" y="280">0x0000000000001aab &lt;+57&gt;:  ret</tspan><tspan x="20" y="302"></tspan><tspan x="20" y="324">What to look at:</tspan><tspan x="20" y="346">- this function only reads slot[idx].off and returns it</tspan><tspan x="20" y="368">- there is no pthread_mutex_lock here</tspan><tspan x="20" y="390">- so Main can fetch an old offset before GC moves the heap</tspan></text></svg>