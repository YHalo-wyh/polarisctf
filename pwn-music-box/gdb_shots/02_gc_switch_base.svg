<svg xmlns="http://www.w3.org/2000/svg" width="900" height="456"><rect width="100%" height="100%" fill="#0d1117"/><text x="20" y="32" font-family="DejaVu Sans Mono, monospace" font-size="18" fill="#7ee787">02 gc switch base</text><text x="20" y="60" font-family="DejaVu Sans Mono, monospace" font-size="16" fill="#c9d1d9"><tspan x="20" y="60">pwndbg&gt; break *GarbageClean+0x157</tspan><tspan x="20" y="82">pwndbg&gt; continue</tspan><tspan x="20" y="104"></tspan><tspan x="20" y="126">Thread 2 hit Breakpoint: GarbageClean+0x157</tspan><tspan x="20" y="148">[before_base_switch]</tspan><tspan x="20" y="170">0x555555558310 &lt;gc+16&gt;:  0x0000555555558318</tspan><tspan x="20" y="192">pwndbg&gt; ni</tspan><tspan x="20" y="214">[after_base_switch]</tspan><tspan x="20" y="236">0x555555558310 &lt;gc+16&gt;:  0x0000555555558718</tspan><tspan x="20" y="258">0x555555558b18 &lt;gc+2072&gt;: 0xffffffff  0x00000010  0xffffffff  0x00000000</tspan><tspan x="20" y="280">0x555555558b28 &lt;gc+2088&gt;: 0xffffffff  0x00000000  0xffffffff  0x00000000</tspan><tspan x="20" y="302">#0  GarbageClean()</tspan><tspan x="20" y="324">#1  start_thread()</tspan><tspan x="20" y="346"></tspan><tspan x="20" y="368">What to look at:</tspan><tspan x="20" y="390">- gc.base changes from 0x...8318 to 0x...8718</tspan><tspan x="20" y="412">- that means heap switched from space0 to space1</tspan><tspan x="20" y="434">- old offset is now stale if Main fetched it before this point</tspan></text></svg>