server {
    listen 80;
    server_name iot-guardian.local;


    root /var/www/html;
    index index.html;

    # ---------- Static Assets ----------
    location /static {
        alias /var/www/static/;
    }

    # ---------- Device API (public, no auth) ----------
    # Backend: device-api service (:3001)
    # Provides device inventory and status queries
    # /var/www/app/device-api
    location /api/devices {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---------- Config Service (JWT auth required) ----------
    # Backend: config-service (:3002), JWT: /var/www/app/config.yaml
    # Device configuration management
    # /var/www/app/config-service
    location /api/config/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---------- Log Service (JWT auth required) ----------
    # Backend: log-service (:3003), JWT: /var/www/app/config.yaml
    # Device log queries and analysis
    # /var/www/app/log-service
    location /api/logs {
        proxy_pass http://127.0.0.1:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---------- Admin Config Panel ----------
    # Direct access to config-service management
    # IP whitelist - internal network only
    # allow 10.10.0.0/24;
    # allow 127.0.0.1;
    # deny all;
    # [2024-12-20] Ops temporarily disabled IP restriction for network debugging
    # TODO: Re-enable after troubleshooting!!!
    location /admin/config/ {
        proxy_pass http://127.0.0.1:3002/api/config/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---------- Security Headers ----------
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # ---------- Deny access to hidden files ----------
    location ~ /\. {
        deny all;
    }

    # Logging
    access_log /var/log/nginx/iot-guardian.access.log;
    error_log /var/log/nginx/iot-guardian.error.log;
}
