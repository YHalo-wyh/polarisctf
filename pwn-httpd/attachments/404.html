<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>404 - 页面不存在</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* === 全局重置，与登录/设置页面保持一致 === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 卡片容器：纯白、圆角、极细边框、柔和阴影 */
        .error-card {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.02);
            border: 1px solid #edf0f3;
            text-align: center;
        }

        /* 大号状态码 */
        .error-code {
            font-size: 80px;
            font-weight: 600;
            color: #2563eb;
            line-height: 1;
            margin-bottom: 16px;
            letter-spacing: -2px;
        }

        /* 标题 */
        .error-title {
            font-size: 26px;
            font-weight: 500;
            color: #1a2634;
            margin-bottom: 12px;
        }

        /* 描述文字 */
        .error-message {
            font-size: 16px;
            color: #7a8b9b;
            margin-bottom: 36px;
            line-height: 1.6;
            border-bottom: 1px solid #edf0f3;
            padding-bottom: 28px;
        }

        /* 返回首页按钮 — 与登录/保存按钮完全一致 */
        .back-btn {
            display: inline-block;
            width: 100%;
            padding: 14px 24px;
            background: #2563eb;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .back-btn:hover {
            background: #1d4ed8;
        }

        .back-btn:active {
            background: #1e3a8a;
        }

        /* 极简辅助线（可选） */
        .hr-light {
            margin: 32px 0 20px;
            border: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d0d9e0, transparent);
        }

        /* 小提示文本 */
        .hint-text {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 20px;
        }

        /* 响应式微调 */
        @media (max-width: 500px) {
            .error-card {
                padding: 36px 28px;
            }
            .error-code {
                font-size: 68px;
            }
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">404</div>
        
        <div class="error-title">页面走丢了</div>

        <div class="error-message">
            您访问的地址不存在或已被移除<br>
            请检查网址后重新尝试
        </div>

        <a href="/" class="back-btn" id="homeLink">← 返回首页</a>
        
        <div class="hr-light"></div>
        <div class="hint-text">
            路由器管理 · 安全连接
        </div>
    </div>

    <script>

        document.getElementById('homeLink').addEventListener('click', function(e) {

        });
    </script>
</body>
</html>
